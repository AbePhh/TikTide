services:
  mysql:
    image: docker.1ms.run/library/mysql:8.0
    container_name: tiktide-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tiktide
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: docker.1ms.run/library/redis:7-alpine
    container_name: tiktide-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: docker.1ms.run/library/adminer:4
    container_name: tiktide-adminer
    restart: unless-stopped
    depends_on:
      - mysql
    ports:
      - "8082:8080"

  redis-commander:
    image: docker.1ms.run/rediscommander/redis-commander:latest
    container_name: tiktide-redis-commander
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8083:8081"

  swagger-ui:
    image: docker.1ms.run/swaggerapi/swagger-ui:latest
    container_name: tiktide-swagger-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - ../../docs/openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
    environment:
      SWAGGER_JSON: /openapi.yaml

volumes:
  mysql_data:
  redis_data:
